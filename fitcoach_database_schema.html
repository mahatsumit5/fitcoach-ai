
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  profiles ||--o{ workout_sessions : has
  profiles ||--o{ nutrition_logs : has
  profiles ||--o{ ai_messages : has
  profiles ||--o{ water_logs : has
  workout_sessions ||--o{ session_exercises : contains
  exercises ||--o{ session_exercises : referenced_by
  workout_plans ||--o{ plan_exercises : contains
  exercises ||--o{ plan_exercises : referenced_by
  profiles ||--o{ workout_plans : owns

  profiles {
    uuid id PK
    string email
    string display_name
    int age
    float weight_kg
    float height_cm
    string fitness_goal
    string experience_level
    string[] dietary_prefs
    string[] injuries
    string push_token
    timestamp created_at
  }
  exercises {
    uuid id PK
    string name
    string muscle_group
    string equipment
    string difficulty
    string instructions
    timestamp created_at
  }
  workout_plans {
    uuid id PK
    uuid profile_id FK
    string name
    string ai_generated
    jsonb plan_data
    timestamp created_at
  }
  workout_sessions {
    uuid id PK
    uuid profile_id FK
    string name
    int duration_seconds
    int calories_burned
    boolean completed
    timestamp started_at
  }
  session_exercises {
    uuid id PK
    uuid session_id FK
    uuid exercise_id FK
    int sets
    int reps
    float weight_kg
    int rest_seconds
    jsonb set_logs
  }
  nutrition_logs {
    uuid id PK
    uuid profile_id FK
    string meal_name
    int calories
    float protein_g
    float carbs_g
    float fat_g
    timestamp logged_at
  }
  water_logs {
    uuid id PK
    uuid profile_id FK
    int amount_ml
    timestamp logged_at
  }
  ai_messages {
    uuid id PK
    uuid profile_id FK
    string role
    text content
    string context_type
    timestamp created_at
  }
  plan_exercises {
    uuid id PK
    uuid plan_id FK
    uuid exercise_id FK
    int day_of_week
    int sets
    int reps
    string notes
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
